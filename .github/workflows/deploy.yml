name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build AppGastosCompartidos
        working-directory: projects/AppGastosCompartidos
        run: |
          npm install
          npm run build

      - name: Build AppGastosMios
        working-directory: projects/AppGastosMios
        run: |
          npm install
          npm run build

      - name: Prepare site
        run: |
          # AppGastosCompartidos
          rm -rf projects/AppGastosCompartidos/src
          rm -f  projects/AppGastosCompartidos/vite.config.js \
                 projects/AppGastosCompartidos/package.json \
                 projects/AppGastosCompartidos/package-lock.json \
                 projects/AppGastosCompartidos/eslint.config.js \
                 projects/AppGastosCompartidos/index.html
          cp -r projects/AppGastosCompartidos/dist/. projects/AppGastosCompartidos/
          rm -rf projects/AppGastosCompartidos/dist

          # AppGastosMios
          rm -rf projects/AppGastosMios/src
          rm -f  projects/AppGastosMios/vite.config.ts \
                 projects/AppGastosMios/package.json \
                 projects/AppGastosMios/package-lock.json \
                 projects/AppGastosMios/eslint.config.js \
                 projects/AppGastosMios/tsconfig.json \
                 projects/AppGastosMios/tsconfig.app.json \
                 projects/AppGastosMios/tsconfig.node.json \
                 projects/AppGastosMios/index.html
          cp -r projects/AppGastosMios/dist/. projects/AppGastosMios/
          rm -rf projects/AppGastosMios/dist

          # Evitar que Jekyll interfiera con los assets de Vite
          touch .nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
